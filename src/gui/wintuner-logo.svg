<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="winGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0078D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#005A9E;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#winGradient)" />
  
  <!-- Windows logo simplified -->
  <rect x="16" y="16" width="14" height="14" fill="white" rx="2" />
  <rect x="34" y="16" width="14" height="14" fill="white" rx="2" />
  <rect x="16" y="34" width="14" height="14" fill="white" rx="2" />
  <rect x="34" y="34" width="14" height="14" fill="white" rx="2" />
  
  <!-- Tuning indicator - small gear/speed lines -->
  <g stroke="white" stroke-width="2" fill="none" stroke-linecap="round">
    <line x1="32" y1="8" x2="32" y2="12" />
    <line x1="32" y1="52" x2="32" y2="56" />
    <line x1="8" y1="32" x2="12" y2="32" />
    <line x1="52" y1="32" x2="56" y2="32" />
  </g>
</svg>
